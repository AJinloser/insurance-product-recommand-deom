services:
  - type: web
    name: insurance-product-recommend-demo
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: INSURANCE_LLM_API_KEY
        sync: false
      - key: INSURANCE_LLM_MODEL
        value: gpt-4o
      - key: INSURANCE_LLM_BASE_URL
        sync: false
